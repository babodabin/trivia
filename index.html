<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>아는 척</title>
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f1118">
<link rel="apple-touch-icon" href="icon-180.png">
<style>
  :root{
    --bg:#0a0b10;
    --bg2:#0f1118;
    --surface:#151823;
    --surface2:#1b1f2c;
    --line:#242938;
    --ink:#f0f2f7;
    --ink-dim:#aab2c4;
    --ink-mute:#6b7285;
    --ink-faint:#4a5064;
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html, body { height:100%; overflow:hidden; }
  body {
    background:
      radial-gradient(1100px 600px at 50% -8%, #14172200, #0a0b10 60%),
      var(--bg);
    font-family:-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Noto Sans KR',sans-serif;
    color:var(--ink);
    user-select:none; -webkit-user-select:none;
    display:flex; flex-direction:column;
    padding-top:max(env(safe-area-inset-top), 12px);
    padding-bottom:max(env(safe-area-inset-bottom), 14px);
  }
  header {
    padding:8px 20px 14px;
    display:flex; align-items:center; justify-content:space-between;
  }
  header h1 { font-size:21px; font-weight:850; letter-spacing:-0.4px; }
  header h1 span {
    background:linear-gradient(135deg,#8a93ff,#b58cff);
    -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;
  }
  #counter {
    font-size:12px; font-weight:700; color:var(--ink-mute);
    font-variant-numeric:tabular-nums;
    background:var(--surface); border:1px solid var(--line);
    padding:5px 11px; border-radius:20px;
  }

  /* 분야 필터 */
  #cats { display:flex; gap:8px; overflow-x:auto; padding:2px 16px 14px; -webkit-overflow-scrolling:touch; }
  #cats::-webkit-scrollbar { display:none; }
  .cat {
    flex:0 0 auto; font-size:13.5px; font-weight:750;
    padding:9px 15px; border-radius:22px;
    background:var(--surface); border:1px solid var(--line); color:var(--ink-mute);
    transition:all .18s;
  }
  .cat.on {
    color:#fff; border-color:transparent;
    background:linear-gradient(135deg, color-mix(in srgb, var(--c) 90%, #000), color-mix(in srgb, var(--c) 55%, #1a1a22));
    box-shadow:0 4px 14px color-mix(in srgb, var(--c) 35%, transparent);
  }

  /* 카드 영역 */
  #stage { flex:1; position:relative; margin:0 18px; min-height:0; }
  #card {
    position:absolute; inset:0;
    background:linear-gradient(158deg, var(--surface2), var(--bg2));
    border:1px solid var(--line); border-radius:26px;
    padding:28px 26px 26px;
    display:flex; flex-direction:column;
    box-shadow:0 20px 50px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.03);
    overflow:hidden;
  }
  /* 상단 분야 색 액센트 바 */
  #card::before{
    content:''; position:absolute; top:0; left:0; right:0; height:3px;
    background:var(--cardc, #8a93ff);
  }
  #card-cat {
    align-self:flex-start;
    font-size:12px; font-weight:800; letter-spacing:0.06em;
    padding:6px 13px; border-radius:20px;
    color:var(--cardc,#8a93ff);
    background:color-mix(in srgb, var(--cardc,#8a93ff) 15%, transparent);
    border:1px solid color-mix(in srgb, var(--cardc,#8a93ff) 30%, transparent);
  }
  #card-title {
    font-size:clamp(23px, 6.6vw, 31px); font-weight:900; line-height:1.32;
    margin-top:20px; letter-spacing:-0.5px;
    padding-right:34px;
  }
  #card-body {
    font-size:clamp(15.5px, 4.3vw, 18px); line-height:1.75;
    margin-top:16px; color:var(--ink-dim); flex:1;
    overflow-y:auto;
  }
  #card-body::-webkit-scrollbar{ display:none; }
  #card-flex {
    margin-top:16px; padding:14px 16px;
    background:color-mix(in srgb, var(--cardc,#8a93ff) 8%, var(--surface));
    border:1px solid color-mix(in srgb, var(--cardc,#8a93ff) 18%, transparent);
    border-radius:14px;
    font-size:clamp(13.5px, 3.8vw, 15.5px); line-height:1.65;
    color:var(--ink-dim);
  }
  #card-flex b { color:var(--cardc,#aeb8ff); font-weight:800; letter-spacing:0.02em; }
  #fav-star {
    position:absolute; top:22px; right:22px;
    font-size:23px; color:var(--ink-faint); cursor:pointer;
    transition:transform .15s, color .15s; z-index:2;
  }
  #fav-star.on { color:#ffd23b; transform:scale(1.1); }

  /* 하단 컨트롤 */
  #controls {
    display:flex; align-items:center; gap:12px;
    padding:18px 18px 8px;
  }
  .nav-btn {
    font-size:15.5px; font-weight:800;
    padding:16px 0; border-radius:16px;
    background:var(--surface); border:1px solid var(--line); color:var(--ink-dim);
    transition:transform .1s;
  }
  .nav-btn:active { transform:scale(0.97); }
  #prev-btn { flex:1; }
  #next-btn {
    flex:2.4;
    background:linear-gradient(135deg,#8a93ff,#7c8cff);
    color:#0a0b10; border:none; font-weight:850;
    box-shadow:0 6px 18px rgba(124,140,255,0.28);
  }
  #hint { text-align:center; font-size:11.5px; font-weight:600; color:var(--ink-faint); padding-top:4px; }
</style>
</head>
<body>
  <header>
    <h1>아는 <span>척</span></h1>
    <div id="counter"></div>
  </header>
  <div id="cats"></div>
  <div id="stage">
    <div id="card">
      <div id="fav-star">★</div>
      <div id="card-cat"></div>
      <div id="card-title"></div>
      <div id="card-body"></div>
      <div id="card-flex"></div>
    </div>
  </div>
  <div id="controls">
    <button class="nav-btn" id="prev-btn">← 이전</button>
    <button class="nav-btn" id="next-btn">다음 →</button>
  </div>
  <div id="hint">좌우로 넘기거나 카드를 탭하세요 · ★ 모아보기</div>

<script>
if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{ navigator.serviceWorker.register('sw.js').catch(()=>{}); });
}
</script>
<script>
(function(){
  // ───────── 분야 ─────────
  const CATS={
    psych:  {name:'심리학', color:'#7c8cff'},
    crime:  {name:'범죄학', color:'#ff6b6b'},
    econ:   {name:'경제학', color:'#4ecb71'},
    logic:  {name:'논리', color:'#ffb03d'},
    record: {name:'기록·순위', color:'#f6c945'},
    history:{name:'역사', color:'#d98a5f'},
    sport:  {name:'스포츠', color:'#5ad1a5'},
    money:  {name:'돈·부', color:'#3ecf8e'},
    religion:{name:'종교', color:'#b58cff'},
    misc:   {name:'잡학', color:'#3dd6e0'}
  };

  // ───────── 카드 데이터 ─────────
  // {c:분야, t:제목, b:본문(왜 그런가), f:아는 척 포인트}
  const CARDS=[
  // ── 심리학 ──
  {c:'psych', t:'깨진 유리창 이론', b:'건물 창문 하나가 깨진 채 방치되면, 사람들은 "여긴 아무도 신경 안 쓰는 곳"이라 여겨 더 큰 무질서와 범죄가 따라옵니다. 작은 방치가 큰 붕괴의 신호탄이 되는 것.', f:'1990년대 뉴욕이 지하철 낙서부터 지운 뒤 강력범죄가 줄었다는 게 이 이론의 대표 사례.'},
  {c:'psych', t:'방관자 효과', b:'위급한 사람을 봤을 때, 주변에 사람이 많을수록 오히려 아무도 안 돕습니다. "누군가 하겠지" 하며 책임이 분산되기 때문.', f:'그래서 응급 상황에선 "거기 파란 옷 입은 분!" 하고 특정인을 콕 집어야 도움받습니다.'},
  {c:'psych', t:'더닝-크루거 효과', b:'능력이 부족한 사람일수록 자기를 과대평가합니다. 못하니까, 자기가 못한다는 것조차 판단할 능력이 없는 것.', f:'반대로 진짜 전문가는 "나도 아직 멀었다"며 겸손해지는 경향이 있습니다.'},
  {c:'psych', t:'확증 편향', b:'사람은 자기가 믿고 싶은 것만 골라 봅니다. 같은 뉴스도 내 생각과 맞으면 "역시", 틀리면 "가짜"라고 여기죠.', f:'토론이 안 끝나는 이유 대부분이 이것. 양쪽 다 자기 근거만 모으고 있어서.'},
  {c:'psych', t:'앵커링 효과', b:'처음 본 숫자가 기준점(닻)이 되어 이후 판단을 휘두릅니다. 정가 10만원에 줄 그어 5만원이라 쓰면, 5만원이 싸게 느껴지는 것.', f:'협상에서 먼저 숫자를 던지는 사람이 유리한 이유가 바로 이 닻 효과.'},
  {c:'psych', t:'플라시보 효과', b:'약효가 없는 가짜 약도 "이건 잘 듣는 약"이라 믿고 먹으면 실제로 증상이 나아집니다. 믿음 자체가 몸을 바꾸는 것.', f:'그래서 신약 실험은 진짜 약과 가짜 약을 비교해 "믿음 효과"를 빼고 따집니다.'},
  {c:'psych', t:'학습된 무기력', b:'아무리 애써도 안 된다는 걸 반복 경험하면, 나중엔 탈출구가 생겨도 시도조차 안 합니다. 마음이 먼저 포기하는 것.', f:'전기충격 실험의 개가 나중엔 문이 열려도 도망 안 친 데서 나온 개념.'},
  {c:'psych', t:'후광 효과', b:'한 가지가 좋으면 나머지도 좋아 보입니다. 잘생긴 사람이 성격도 좋고 유능할 거라 멋대로 믿는 것.', f:'면접·소개팅에서 첫인상이 그렇게 중요한 이유. 하나가 전체를 물들입니다.'},
  {c:'psych', t:'동조 현상 (애쉬 실험)', b:'명백히 틀린 답이라도, 주변 사람들이 다 그렇게 답하면 따라갑니다. 선 길이 맞히기 실험에서 다수가 오답을 말하자 75%가 한 번은 동조했죠.', f:'"다들 그렇게 한다"는 말이 무서운 이유. 군중 속에선 눈도 흐려집니다.'},
  {c:'psych', t:'밀그램 복종 실험', b:'평범한 사람도 권위자가 시키면 타인에게 전기충격을 주는 잔인한 일을 합니다. "시켜서 했다"는 게 핑계가 아니라 진짜 작동하는 심리.', f:'악행이 꼭 악인에게서만 나오는 게 아니라는, 섬뜩한 증거.'},
  {c:'psych', t:'단순 노출 효과', b:'그냥 자주 보기만 해도 호감이 생깁니다. 처음엔 별로던 노래가 자꾸 들으면 좋아지는 것처럼.', f:'광고가 내용 없이 브랜드만 반복해서 보여주는 이유. 익숙함이 곧 호감.'},
  {c:'psych', t:'피크엔드 법칙', b:'사람은 경험 전체가 아니라 "가장 강렬한 순간(피크)"과 "마지막 순간(엔드)"으로 기억합니다. 중간이 아무리 좋아도 끝이 나쁘면 나쁜 기억.', f:'여행이든 데이트든 마무리를 잘해야 하는 과학적 이유.'},
  {c:'psych', t:'자이가르닉 효과', b:'끝낸 일보다 끝내지 못한 일이 더 오래 기억에 남습니다. 마음이 미완성을 계속 붙들고 있어서.', f:'드라마가 꼭 결정적 순간에 끊고 "다음 주에"로 끝나는 이유.'},
  {c:'psych', t:'가짜 합의 효과', b:'사람은 "남들도 나처럼 생각할 것"이라 과대평가합니다. 내 의견이 실제보다 더 보편적이라 착각하는 것.', f:'"이거 다들 좋아하지 않아?"라는 말이 자주 틀리는 이유.'},
  {c:'psych', t:'문간에 발 들이기', b:'작은 부탁을 먼저 들어주면, 이후 큰 부탁도 거절하기 어려워집니다. 한번 "예스"를 하면 일관성을 지키려 하니까.', f:'영업·모금이 처음엔 사소한 것부터 요청하는 전략의 정체.'},

  // ── 범죄학 ──
  {c:'crime', t:'범죄의 삼각형', b:'범죄가 일어나려면 세 가지가 한자리에 모여야 합니다 — 범행 동기를 가진 사람, 적당한 표적, 그리고 막을 사람의 부재. 하나만 빠져도 범죄는 안 일어납니다.', f:'CCTV·가로등이 범죄를 줄이는 건 "막을 사람(감시)"을 채워 삼각형을 깨기 때문.'},
  {c:'crime', t:'일상활동 이론', b:'범죄는 특별한 악인이 아니라 "기회"에서 나옵니다. 평범한 일상 속에 표적과 허술함이 겹치는 순간 범죄가 생긴다는 것.', f:'"문 잘 잠그라"는 잔소리가 사실 가장 강력한 범죄 예방책인 이유.'},
  {c:'crime', t:'프로파일링', b:'범행 현장의 패턴(수법·장소·시간)에서 범인의 성격·생활을 역추적합니다. 행동이 곧 그 사람의 심리 지문이라는 전제.', f:'드라마 속 "범인은 30대 남성, 차분한 성격" 같은 추리가 여기서 나옵니다.'},
  {c:'crime', t:'낙인 이론', b:'한번 "범죄자"라는 딱지가 붙으면, 사회가 그렇게 대하고 본인도 그렇게 행동하게 됩니다. 낙인이 진짜 범죄자를 만드는 것.', f:'소년범 기록을 지워주는 제도가 있는 이유. 낙인을 막아야 갱생이 됩니다.'},
  {c:'crime', t:'CPTED (환경 설계)', b:'담장을 없애 시야를 트고, 어두운 골목에 조명을 넣으면 범죄가 줄어듭니다. 건물과 거리 설계만으로 범죄를 막는 것.', f:'요즘 아파트 단지가 시야 트인 구조로 짓는 건 이 범죄예방 설계 때문.'},
  {c:'crime', t:'화이트칼라 범죄', b:'양복 입은 전문직이 책상에서 저지르는 횡령·사기는, 강도보다 피해액이 수백 배 크지만 잘 안 보입니다. 피가 안 나니까.', f:'"진짜 큰 도둑은 펜을 쓴다"는 말의 근거. 금융범죄가 대표적.'},
  {c:'crime', t:'무관용 정책', b:'사소한 위반(무임승차·낙서)도 봐주지 않고 단속하면, 큰 범죄로 번지기 전에 막힌다는 정책. 깨진 유리창 이론의 실전판.', f:'효과 논쟁이 있지만, 1990년대 뉴욕 범죄 급감의 핵심 전략으로 꼽힙니다.'},
  {c:'crime', t:'모방 범죄', b:'언론이 범죄를 자세히 보도하면 비슷한 범죄가 잇따릅니다. 수법까지 학습되고, "나도"라는 심리가 번지는 것.', f:'그래서 자살·범죄 보도에 "구체적 방법은 알리지 않는다"는 준칙이 있습니다.'},
  {c:'crime', t:'합리적 선택 이론', b:'범죄자도 "걸릴 위험 vs 얻을 이익"을 계산합니다. 처벌이 무거운 것보다 "확실히 잡힌다"는 게 더 강력한 억제력.', f:'형량을 높이는 것보다 검거율을 높이는 게 범죄를 더 줄이는 이유.'},
  {c:'crime', t:'스톡홀름 증후군', b:'인질이 범인에게 동조하고 심지어 옹호하게 되는 현상. 생존을 위해 가해자에게 의존하다 감정까지 묶이는 것.', f:'1973년 스톡홀름 은행 인질극에서 인질들이 강도를 변호한 데서 유래.'},
  {c:'crime', t:'다크 트라이어드', b:'위험한 성격 세 가지 — 자기애(나르시시즘), 냉혹함(사이코패시), 조종(마키아벨리즘). 범죄·사기꾼에게 자주 겹쳐 나타납니다.', f:'"매력적인데 뭔가 섬뜩한 사람"의 정체일 수 있는 심리 조합.'},
  {c:'crime', t:'범죄 암수 (숨은 범죄)', b:'실제 일어난 범죄 중 신고·집계되는 건 일부뿐. 신고 안 된 범죄가 빙산의 물밑처럼 훨씬 많습니다.', f:'"범죄 통계가 줄었다"가 꼭 안전해졌다는 뜻이 아닌 이유.'},
  {c:'crime', t:'사이코패스 vs 소시오패스', b:'사이코패스는 타고난 뇌 특성(공감 결여)에 가깝고, 소시오패스는 환경·경험으로 형성된 쪽에 가깝습니다. 둘 다 양심의 작동이 다른 것.', f:'사이코패스가 더 냉정·계획적, 소시오패스가 더 충동적이라고들 구분합니다.'},
  {c:'crime', t:'루시퍼 이펙트', b:'평범한 사람도 상황과 역할이 주어지면 악해질 수 있습니다. 스탠퍼드 감옥 실험에서 평범한 학생이 잔인한 간수가 됐죠.', f:'"악은 사람이 아니라 상황에서 나온다"는 주장의 핵심 근거.'},
  {c:'crime', t:'초범 vs 상습범', b:'범죄자 소수가 전체 범죄의 다수를 저지릅니다. 즉 모두를 감시하기보다 상습범에 집중하는 게 효율적.', f:'경찰이 "관리 대상"을 따로 두는 데이터적 이유.'},

  // ── 경제학 ──
  {c:'econ', t:'9,900원의 비밀 (왼쪽 자릿수 효과)', b:'10,000원과 9,900원은 100원 차이지만, 우리 뇌는 맨 앞자리(1만 vs 9천)로 먼저 판단해 훨씬 싸게 느낍니다.', f:'세상 가격표가 죄다 990, 9900으로 끝나는 이유.'},
  {c:'econ', t:'손실 회피', b:'사람은 만원을 얻는 기쁨보다 만원을 잃는 고통을 약 2배 크게 느낍니다. 그래서 손해를 피하려 비합리적 선택을 하죠.', f:'"환불 보장"이 강력한 마케팅인 이유. 잃는 게 무서우니까.'},
  {c:'econ', t:'매몰 비용의 오류', b:'이미 쓴 돈·시간이 아까워서 손해인 걸 계속합니다. 재미없는 영화를 "표값 아까워" 끝까지 보는 것처럼.', f:'"여기까지 했는데"라는 말이 나오면 이 오류를 의심하세요. 이미 쓴 건 못 돌아옵니다.'},
  {c:'econ', t:'기회 비용', b:'무언가를 택하면, 택하지 않은 것의 가치를 잃습니다. 공짜 점심처럼 보여도 그 시간에 할 수 있던 다른 일이 비용.', f:'"세상에 공짜 점심은 없다"는 경제학 격언의 정체.'},
  {c:'econ', t:'미끼 효과', b:'A와 B 사이에서 못 고르다가, 일부러 끼워넣은 별로인 C 덕분에 B를 고르게 됩니다. C는 팔려고 둔 게 아니라 B를 띄우려는 미끼.', f:'팝콘 사이즈가 소·대만 있으면 고민되지만, 비슷한 가격의 중을 끼우면 대를 사게 되는 것.'},
  {c:'econ', t:'공유지의 비극', b:'주인 없는 공동 자원은 모두가 자기 몫을 챙기다 결국 고갈됩니다. 각자에겐 합리적이지만 전체로는 파국.', f:'바다 남획, 공용 냉장고 음식이 사라지는 현상이 다 이것.'},
  {c:'econ', t:'한계 효용 체감', b:'첫 잔의 물은 꿀맛, 다섯 잔째는 고통. 같은 것도 늘어날수록 추가되는 만족이 줄어듭니다.', f:'뷔페에서 처음엔 행복하다 나중엔 괴로운 이유. 부자가 돈에 무뎌지는 것도.'},
  {c:'econ', t:'베블런 효과', b:'비쌀수록 더 잘 팔리는 역설. 명품은 가격을 내리면 오히려 매력이 떨어집니다. 비싼 것 자체가 과시의 가치라서.', f:'"이거 비싼 거야"가 칭찬이 되는 시장이 따로 있다는 것.'},
  {c:'econ', t:'공짜의 힘', b:'1원과 0원은 1원 차이지만, "공짜"라는 말엔 이성이 마비됩니다. 필요 없어도 공짜면 줄을 서죠.', f:'"1+1", "사은품 증정"이 안 망하는 이유. 공짜는 마법의 단어.'},
  {c:'econ', t:'인플레이션', b:'돈의 양이 늘면 돈 가치가 떨어져 물가가 오릅니다. 같은 만원으로 살 수 있는 게 점점 줄어드는 것.', f:'"옛날엔 짜장면이 500원이었는데"가 그냥 추억이 아니라 인플레이션의 증거.'},
  {c:'econ', t:'그레셤의 법칙', b:'"악화가 양화를 구축한다" — 가치 낮은 돈이 돌면 사람들은 좋은 돈을 숨기고 나쁜 돈만 씁니다. 결국 시장엔 나쁜 돈만 남죠.', f:'금화 시대에 순금 동전은 장롱으로, 불순물 섞인 동전만 돌아다닌 데서 나온 법칙.'},
  {c:'econ', t:'밴드왜건 효과', b:'남들이 사니까 나도 삽니다. 수요가 수요를 부르는 것. "요즘 다들 이거 쓴대"가 구매 이유가 되는 현상.', f:'맛집 줄, 베스트셀러, 주식 열풍이 부풀려지는 심리 엔진.'},
  {c:'econ', t:'가격 차별', b:'같은 상품을 사람마다 다른 값에 팝니다. 학생 할인, 조조할인, 비행기 좌석 가격이 다 다른 이유 — 낼 수 있는 만큼 받아내는 전략.', f:'옆자리 승객이 내 항공권보다 싸게 샀을 수 있다는 불편한 진실.'},
  {c:'econ', t:'보이지 않는 손', b:'각자 자기 이익만 좇아도, 시장 전체로는 가격과 공급이 알아서 조절됩니다. 누가 지휘 안 해도 굴러가는 것.', f:'애덤 스미스의 이 한마디가 자본주의 경제학의 출발점.'},
  {c:'econ', t:'죄수의 딜레마', b:'서로 협력하면 둘 다 이득인데, 상대를 못 믿어 둘 다 배신하고 둘 다 손해 보는 상황. 개인의 합리가 모두의 손해로.', f:'담합이 깨지는 이유, 군비 경쟁이 멈추기 힘든 이유가 다 이 구조.'},

  // ── 논리 ──
  {c:'logic', t:'삼단논법', b:'대전제 + 소전제 → 결론. "모든 사람은 죽는다 / 소크라테스는 사람이다 / 따라서 소크라테스는 죽는다." 전제가 참이면 결론도 반드시 참.', f:'논리학 2300년의 기본 골격. 모든 추론의 뼈대입니다.'},
  {c:'logic', t:'허수아비 공격', b:'상대 주장을 약하게 왜곡해놓고 그걸 공격합니다. "운동 좀 하자"고 했더니 "그럼 하루 종일 운동만 하란 거냐"고 받아치는 식.', f:'토론에서 "내 말은 그게 아닌데"가 나오면 십중팔구 이 오류.'},
  {c:'logic', t:'성급한 일반화', b:'몇 개 사례로 전체를 단정합니다. "내가 만난 A 지역 사람 둘이 불친절했어 → A 지역 사람은 다 불친절해."', f:'편견과 혐오가 만들어지는 가장 흔한 논리 경로.'},
  {c:'logic', t:'인신공격 (애드 호미넴)', b:'주장이 아니라 사람을 공격합니다. "그 말이 틀렸다"가 아니라 "네가 뭘 알아"라고 받아치는 것. 내용은 안 다루고 사람만 깎죠.', f:'논쟁이 감정싸움으로 번질 때 거의 항상 등장하는 수법.'},
  {c:'logic', t:'미끄러운 비탈길', b:'"이걸 허용하면 결국 최악까지 간다"고 비약합니다. 중간 단계의 근거 없이 극단으로 미끄러뜨리는 것.', f:'"한 번 봐주면 다음엔 다 해달라 할걸"이라는 말의 논리 구멍.'},
  {c:'logic', t:'순환 논증', b:'결론을 근거로 다시 쓰는 것. "성경은 진리다, 왜냐하면 성경에 그렇게 쓰여 있으니까." 증명할 것을 증명에 끌어다 쓰는 셈.', f:'그럴듯해 보이지만 빙글빙글 도는 논리. 근거가 결론을 못 벗어납니다.'},
  {c:'logic', t:'거짓 딜레마', b:'선택지가 둘뿐인 것처럼 몰아붙입니다. "내 편 아니면 적"처럼. 사실은 제3, 제4의 길이 있는데도.', f:'"이거 아니면 저거"라고 강요받을 때 의심해야 할 함정.'},
  {c:'logic', t:'권위에 호소', b:'"전문가가 그랬으니 맞다"고 끝냅니다. 근거가 아니라 직함으로 우기는 것. 전문가도 틀릴 수 있는데도.', f:'광고의 "의사가 추천한"이 항상 진실은 아닌 이유.'},
  {c:'logic', t:'다수에 호소', b:'"다들 그렇게 생각한다 → 그러니 옳다." 많은 사람이 믿는다고 사실이 되진 않습니다. 한때 다들 지구가 평평하다 믿었듯.', f:'"요즘 다 그래"가 근거가 못 되는 이유.'},
  {c:'logic', t:'인과와 상관의 혼동', b:'두 일이 함께 일어난다고 하나가 원인은 아닙니다. "아이스크림이 팔리면 익사 사고가 는다" → 둘 다 여름 탓이지 서로 원인이 아님.', f:'"A 하니까 B 됐다"는 말의 90%가 이 함정을 밟습니다.'},
  {c:'logic', t:'도박사의 오류', b:'동전이 앞면 다섯 번 나왔으니 "이번엔 뒷면 차례"라 믿는 것. 하지만 동전엔 기억이 없어 매번 확률은 그대로 50%.', f:'복권·도박장이 먹고사는 심리. 과거는 다음 확률을 안 바꿉니다.'},
  {c:'logic', t:'생존자 편향', b:'살아남은 것만 보고 판단합니다. "성공한 사업가는 다 대학 중퇴" → 중퇴하고 망한 수백만은 안 보이니까.', f:'"○○해서 성공했다"는 이야기가 위험한 이유. 실패자는 말이 없습니다.'},
  {c:'logic', t:'복합 질문의 오류', b:'대답하면 함정에 빠지는 질문. "너 이제 거짓말 안 하지?"는 예/아니오 둘 다 거짓말쟁이를 인정하게 만듭니다.', f:'질문 자체에 전제가 숨어 있을 때 의심해야 합니다.'},
  {c:'logic', t:'필요조건과 충분조건', b:'"비가 오면 땅이 젖는다"는 참이지만, "땅이 젖었으니 비가 왔다"는 틀릴 수 있습니다(물 뿌렸을 수도). 방향을 헷갈리면 안 됨.', f:'조건을 거꾸로 뒤집는 실수가 의외로 많습니다.'},
  {c:'logic', t:'오컴의 면도날', b:'같은 걸 설명하는 가설이 여럿이면, 가장 단순한 게 보통 맞습니다. 불필요한 가정을 면도날로 잘라내라는 것.', f:'창밖에 소리 났을 때, 외계인보다 고양이를 먼저 의심하는 게 합리적인 이유.'},

  // ── 잡학 ──
  {c:'misc', t:'세계에서 가장 짧은 전쟁', b:'1896년 영국과 잔지바르의 전쟁은 단 38분 만에 끝났습니다. 잔지바르가 거의 즉시 항복했죠. 기네스북 공식 최단 전쟁.', f:'"전쟁이 어떻게 38분이야?"라는 반응이 바로 이 지식의 매력.'},
  {c:'misc', t:'꿀은 썩지 않는다', b:'수분이 적고 산성이라 세균이 못 삽니다. 이집트 피라미드에서 발견된 3000년 된 꿀도 먹을 수 있는 상태였죠.', f:'유통기한 없는 거의 유일한 식품. 굳으면 데우면 다시 녹습니다.'},
  {c:'misc', t:'문어의 심장은 3개', b:'두 개는 아가미로, 한 개는 온몸으로 피를 보냅니다. 게다가 피는 구리 성분이라 빨강이 아니라 파란색.', f:'헤엄칠 땐 중앙 심장이 멈춰서, 문어는 헤엄치면 쉽게 지칩니다.'},
  {c:'misc', t:'바나나는 베리, 딸기는 아니다', b:'식물학에서 베리는 "씨가 과육에 박힌 열매". 바나나는 여기 맞지만, 딸기는 씨가 겉에 붙어 있어 베리가 아닙니다.', f:'토마토·수박·포도도 식물학적으론 베리입니다. 이름과 분류는 따로 놀죠.'},
  {c:'misc', t:'에펠탑은 여름에 더 크다', b:'쇠는 열을 받으면 늘어납니다. 그래서 더운 여름엔 에펠탑이 약 15cm 더 커집니다.', f:'다리·철로에 일부러 틈(신축이음)을 두는 것도 같은 이유.'},
  {c:'misc', t:'우주에선 금속이 그냥 붙는다', b:'진공에서 같은 금속 두 조각을 맞대면 경계 없이 하나로 붙습니다(냉용접). 공기 중 산화막이 없어서.', f:'우주선 부품 설계가 까다로운 숨은 이유 중 하나.'},
  {c:'misc', t:'사람 위는 면도날도 녹인다', b:'위산은 pH 1~2의 강산이라 금속도 부식시킵니다. 위 자신이 안 녹는 건 점막이 2주마다 새로 갈리기 때문.', f:'위벽은 자기 몸을 자기 산으로부터 끊임없이 다시 짓고 있는 셈.'},
  {c:'misc', t:'지구의 산소는 대부분 바다에서', b:'우리가 마시는 산소의 절반 이상은 숲이 아니라 바다의 식물성 플랑크톤이 만듭니다.', f:'"지구의 허파는 아마존"이라지만, 진짜 허파는 바다에 가깝습니다.'},
  {c:'misc', t:'클레오파트라는 피라미드보다 아이폰에 가깝다', b:'기자 피라미드 건설은 기원전 2500년경, 클레오파트라는 기원전 30년경. 그와 현대(2000년대) 사이보다, 그와 피라미드 사이가 더 멉니다.', f:'역사의 시간 감각을 박살내는 대표적 사실.'},
  {c:'misc', t:'옥스퍼드 대학은 아즈텍보다 오래됐다', b:'옥스퍼드는 1096년경 이미 강의를 했고, 아즈텍 제국은 1300년대에 세워졌습니다. 대학이 한 문명보다 먼저 있던 것.', f:'"대학 역사가 한 제국보다 길다"는 게 의외로 충격.'},
  {c:'misc', t:'바다보다 우주 지도를 더 잘 안다', b:'화성·달 표면은 정밀 지도가 있지만, 지구 심해 바닥은 80% 이상이 미탐사. 깊은 바다는 우주만큼 미지의 영역.', f:'발밑(심해)보다 머리 위(우주)를 더 잘 안다는 역설.'},
  {c:'misc', t:'1초의 정의는 빛이 아니라 원자', b:'1초는 세슘 원자가 정확히 9,192,631,770번 진동하는 시간으로 정의됩니다. 지구 자전은 들쭉날쭉해서 못 믿거든요.', f:'그래서 가끔 "윤초"를 넣어 시계와 지구 자전을 맞춥니다.'},
  {c:'misc', t:'기린과 사람의 목뼈 수는 같다', b:'둘 다 목뼈가 7개입니다. 기린은 뼈 하나하나가 길 뿐, 개수는 거의 모든 포유류가 똑같죠.', f:'생쥐도, 고래도 목뼈는 7개. 진화가 남긴 공통 설계.'},
  {c:'misc', t:'번개는 같은 곳에 또 친다', b:'"번개는 한 곳에 두 번 안 친다"는 미신. 높은 건물엔 오히려 반복해서 칩니다. 엠파이어스테이트는 연 20번 이상.', f:'피뢰침이 존재하는 이유 자체가 이 미신을 반박합니다.'},
  {c:'misc', t:'핫도그 1개는 수명을 줄인다?', b:'한 연구는 가공육 핫도그 하나가 건강 수명을 약 36분 줄인다고 추정했습니다. 물론 통계적 평균일 뿐이지만.', f:'"이 한 입이 36분"이라는 말로 식탁 분위기를 환기시킬 수 있습니다.'},

  // ── 기록·순위 ──
  {c:'record', t:'세계에서 가장 높은 건물', b:'두바이의 부르즈 할리파가 828m로 압도적 1위입니다. 2010년 완공 이후 아직 아무도 못 넘었죠. 곧 사우디의 제다 타워(1,000m 목표)가 도전 중.', f:'2위권 건물들이 600m대인 걸 감안하면, 부르즈 할리파의 828m는 한동안 안 깨질 기록.'},
  {c:'record', t:'세계에서 가장 긴 강', b:'나일강(약 6,650km)과 아마존강(약 6,400km)이 1위를 두고 다툽니다. 측정 방식에 따라 순위가 바뀌어 아직도 논쟁 중.', f:'"세계 최장 강은?"에 딱 하나로 답 못 하는 이유. 학계도 아직 안 갈렸습니다.'},
  {c:'record', t:'세계에서 가장 깊은 곳', b:'태평양 마리아나 해구의 챌린저 해연, 약 11,000m. 에베레스트(8,849m)를 통째로 넣어도 물에 잠깁니다.', f:'인류가 달에는 12명이 갔지만, 이 깊이 바닥엔 극소수만 내려갔습니다.'},
  {c:'record', t:'세계에서 가장 인구가 많은 나라', b:'2023년 인도가 중국을 제치고 1위(약 14억)가 됐습니다. 수십 년간 1위였던 중국이 저출산으로 내려앉은 것.', f:'"세계 1위 인구 = 중국"은 이제 옛날 상식. 인도로 바뀌었습니다.'},
  {c:'record', t:'가장 많이 팔린 단일 음반', b:'마이클 잭슨의 «Thriller»(1982)가 역대 최다 판매 앨범입니다. 전 세계 수천만 장이 팔렸죠.', f:'스트리밍 시대엔 이런 물리 음반 기록이 다시 나오기 거의 불가능합니다.'},
  {c:'record', t:'가장 오래 산 사람', b:'공식 기록상 프랑스의 잔 칼망, 122년 164일. 1875년에 태어나 1997년까지 살았습니다. 반 고흐를 직접 봤다고 증언했죠.', f:'"세 세기에 걸쳐 살았다"는 표현이 과장이 아닌 유일한 사람.'},
  {c:'record', t:'가장 빠른 육상동물', b:'치타는 순간 시속 100km를 넘깁니다. 다만 20~30초밖에 못 달려요. 지구력으론 인간이 치타를 이깁니다.', f:'단거리는 치타, 마라톤은 인간. 인간은 지구상 최고의 "오래 달리기" 동물입니다.'},
  {c:'record', t:'가장 큰 동물', b:'대왕고래(흰긴수염고래)는 길이 30m, 무게 150톤이 넘습니다. 지구 역사상 존재한 가장 큰 동물로, 공룡보다도 큽니다.', f:'심장 하나가 소형차만 하고, 혀 무게만 코끼리 한 마리급.'},
  {c:'record', t:'가장 작은 나라', b:'바티칸 시국, 면적 0.44km². 웬만한 대학 캠퍼스보다 작습니다. 인구도 수백 명뿐.', f:'"나라"인데 걸어서 몇 분이면 가로지르는 곳. 그래도 엄연한 독립국.'},
  {c:'record', t:'가장 많이 쓰이는 언어', b:'모국어 화자 수로는 중국어(관화)가 1위, 하지만 "쓰는 사람 전체"로는 영어가 1위입니다. 제2외국어로 배우는 사람이 압도적이라.', f:'"세계 공용어는 영어"가 맞는 이유는 원어민이 아니라 학습자 수 때문.'},
  {c:'record', t:'가장 방문객 많은 미술관', b:'파리 루브르 박물관, 연간 수백만 명. 모나리자 한 점을 보려고 세계에서 몰려듭니다.', f:'정작 모나리자는 생각보다 작아서(77×53cm) 처음 본 사람들이 놀랍니다.'},

  // ── 역사 ──
  {c:'history', t:'로마는 하루아침에 안 망했다', b:'서로마 제국은 476년에 "멸망"이라 하지만, 실제론 수백 년에 걸쳐 서서히 무너졌습니다. 한순간의 붕괴가 아니라 긴 쇠퇴.', f:'"로마는 하루아침에 이뤄지지 않았다"는 말의 반대편 진실 — 망하는 것도 하루아침이 아니었습니다.'},
  {c:'history', t:'만리장성은 우주에서 안 보인다', b:'"우주에서 보이는 유일한 인공물"은 유명한 오해입니다. 폭이 좁아 맨눈으론 안 보여요. 우주비행사들도 부정했죠.', f:'오히려 밤의 도시 불빛이 우주에서 훨씬 잘 보입니다.'},
  {c:'history', t:'나폴레옹은 작지 않았다', b:'"키 작은 나폴레옹"은 오해입니다. 당시 프랑스 평균 이상(약 170cm)이었죠. 영국의 선전과 단위 혼동이 만든 이미지.', f:'"나폴레옹 콤플렉스"라는 말 자체가 틀린 전제 위에 세워진 셈.'},
  {c:'history', t:'피라미드는 노예가 안 지었다', b:'최근 연구로는 피라미드를 지은 건 노예가 아니라 급여와 숙식을 받은 노동자들이었습니다. 무덤 근처에서 그들의 마을과 무덤도 발견됐죠.', f:'"채찍 맞는 노예"라는 영화 속 장면은 사실과 거리가 멉니다.'},
  {c:'history', t:'중세 사람들은 지구가 둥근 걸 알았다', b:'"중세엔 지구가 평평하다 믿었다"는 근대에 만들어진 신화입니다. 고대 그리스부터 지식인들은 지구가 구형인 걸 알았죠.', f:'콜럼버스도 "지구가 둥글다"를 증명하러 간 게 아닙니다. 그건 이미 상식이었어요.'},
  {c:'history', t:'가장 오래된 회사', b:'일본의 곤고구미는 578년 창업해 1,400년 넘게 사찰을 지어온 건설사였습니다. 세계 최고(最古) 기업으로 꼽히죠.', f:'서양 어떤 나라보다도, 어떤 대학보다도 오래된 "현역" 조직이었습니다.'},
  {c:'history', t:'클레오파트라는 이집트인이 아니다', b:'그녀는 그리스계(프톨레마이오스 왕조) 혈통입니다. 이집트를 다스렸지만 문화적으론 그리스에 뿌리를 뒀죠.', f:'"이집트 여왕"이지만 조상은 알렉산더 대왕의 부하 장군이었습니다.'},
  {c:'history', t:'검은 죽음이 세상을 바꿨다', b:'14세기 흑사병으로 유럽 인구의 3분의 1이 죽었습니다. 노동력이 귀해지자 농노의 지위가 오르고 봉건제가 흔들렸죠.', f:'비극이 역설적으로 중세 신분제를 무너뜨린 계기가 됐습니다.'},
  {c:'history', t:'제1차 세계대전의 방아쇠', b:'1914년 사라예보에서 오스트리아 황태자가 암살되자, 동맹 관계가 도미노처럼 무너지며 전 유럽이 전쟁에 휘말렸습니다.', f:'한 발의 총성이 4년간 수천만 명이 죽는 전쟁으로 번진, 역사상 가장 비싼 방아쇠.'},
  {c:'history', t:'냉전은 총 없는 전쟁', b:'미국과 소련은 직접 총을 겨누진 않았지만, 40년간 핵·우주·스포츠·간첩으로 대결했습니다. "차가운" 전쟁이라 불린 이유.', f:'대리전(베트남·한국 등)으로 열기는 뜨거웠던, 이름만 차가운 전쟁.'},

  // ── 스포츠 ──
  {c:'sport', t:'마라톤이 42.195km인 이유', b:'원래 딱 떨어지는 거리가 아니었습니다. 1908년 런던 올림픽에서 왕실이 잘 보이게 코스를 늘린 게 그대로 표준이 됐죠.', f:'"왜 하필 42.195?"의 답은 과학이 아니라 영국 왕실의 관람 편의였습니다.'},
  {c:'sport', t:'축구공은 원래 갈색이었다', b:'흑백 TV 시대에 공이 잘 안 보여서, 1970년 월드컵부터 흑백 무늬 공이 도입됐습니다. 지금의 상징적 디자인이 여기서.', f:'그 유명한 검은 오각형·흰 육각형 공은 사실 방송 기술 때문에 태어났습니다.'},
  {c:'sport', t:'올림픽 오륜기의 색', b:'파랑·노랑·검정·초록·빨강 다섯 색과 흰 바탕은, 당시 모든 나라 국기에 이 중 하나는 들어가도록 고른 것입니다. 대륙이 아니라 국기 기준.', f:'"오륜 색이 각 대륙"이라는 건 흔한 오해. 실제론 모든 국기를 포괄하려는 설계.'},
  {c:'sport', t:'야구에 시간 제한이 없다', b:'대부분 스포츠는 시간이 정해져 있지만, 야구는 27개의 아웃을 잡아야 끝납니다. 이론상 무한히 길어질 수 있죠.', f:'"경기 시간"이 아니라 "아웃 카운트"로 끝나는 드문 종목. 그래서 대역전이 가능.'},
  {c:'sport', t:'테니스 점수는 왜 15-30-40?', b:'중세 시계 문자판(15·30·45분)에서 유래했다는 설이 유력합니다. 45가 발음 편의로 40이 됐다는 거죠.', f:'0을 "러브(love)"라 부르는 것도, 프랑스어 달걀(l\'oeuf, 0 모양)에서 왔다는 설이 있습니다.'},
  {c:'sport', t:'가장 많은 관중이 든 경기', b:'1950년 브라질 월드컵 결승, 마라카낭 경기장에 약 20만 명이 들어찼습니다. 지금도 깨지기 힘든 기록.', f:'홈팀 브라질이 우루과이에 져서, 그 침묵은 "마라카낭의 비극"으로 불립니다.'},
  {c:'sport', t:'복싱 체급이 많은 이유', b:'체중 1~2kg 차이도 펀치 위력에 큰 영향을 줍니다. 그래서 공정성을 위해 세밀하게 체급을 나눈 것.', f:'"헤비급 챔피언이 최강"이라지만, 체급이 다르면 애초에 안 붙는 이유.'},
  {c:'sport', t:'F1 드라이버는 목이 굵어진다', b:'코너에서 최대 5G의 힘이 목에 걸립니다. 머리 무게가 순간 수십 kg처럼 느껴져, 드라이버들은 목 근육을 따로 단련하죠.', f:'"운전이 무슨 운동이냐"는 말이 F1 앞에선 안 통하는 이유.'},
  {c:'sport', t:'수영 세계기록과 수영복', b:'2008~2009년 전신 폴리우레탄 수영복으로 세계기록이 쏟아지자, 국제수영연맹이 그 수영복을 금지했습니다. 기술이 기록을 왜곡한 사례.', f:'그때 세운 기록 일부는 아직도 안 깨졌습니다. "장비 도핑"이라 불렸죠.'},
  {c:'sport', t:'농구 3점 라인은 원래 없었다', b:'초창기 농구엔 모든 골이 2점이었습니다. 1979년 NBA가 3점 라인을 도입하며 경기가 완전히 달라졌죠.', f:'요즘 "3점 슛 시대"의 화려한 농구는 사실 40여 년밖에 안 된 규칙 덕분.'},

  // ── 돈·부 ──
  {c:'money', t:'세계에서 가장 비싼 건물', b:'사우디아라비아의 성지 메카에 있는 아브라즈 알-바이트(메카 로열 시계탑)는 건설비가 약 150억 달러로 추정됩니다. 초고가 건축물의 대표.', f:'단순 높이가 아니라 "돈이 가장 많이 들어간 건물"로 자주 꼽힙니다.'},
  {c:'money', t:'가장 비싼 그림', b:'레오나르도 다 빈치의 «살바토르 문디»가 2017년 약 4억 5천만 달러에 팔렸습니다. 그림 한 점 값이 웬만한 빌딩값.', f:'그런데 진품 논란이 아직도 있어서, 이 천문학적 가격의 정당성이 논쟁 중.'},
  {c:'money', t:'1달러 지폐의 수명', b:'미국 1달러 지폐는 평균 약 6년 정도 유통되다 폐기됩니다. 많이 쓰이는 소액권일수록 빨리 닳죠.', f:'고액권일수록 오래 갑니다. 잘 안 쓰고 보관되니까.'},
  {c:'money', t:'세계에서 가장 비싼 화폐 단위', b:'쿠웨이트 디나르는 1디나르가 미국 3달러가 넘어, 액면가 기준 세계 최고가 통화입니다. 산유국의 강한 경제가 배경.', f:'"달러가 제일 비싼 돈"이라 생각하기 쉽지만, 단위 가치로는 아닙니다.'},
  {c:'money', t:'복리는 왜 무서운가', b:'원금에 이자가 붙고, 그 이자에 또 이자가 붙습니다. 아인슈타인이 "세계 8번째 불가사의"라 했다는 말이 돌 정도로 시간이 지날수록 폭발적.', f:'"눈덩이 효과". 초반엔 미미하지만 후반에 급격히 불어납니다.'},
  {c:'money', t:'가장 비싼 도시', b:'생활비 기준으로 싱가포르·홍콩·취리히 등이 매년 최상위권을 다툽니다. 집값·물가·세금이 종합적으로 반영되죠.', f:'"연봉이 높아도 남는 게 없다"는 도시들의 공통점.'},
  {c:'money', t:'세계 최초의 지폐', b:'종이돈은 중국 송나라(약 11세기)에서 처음 쓰였습니다. 유럽보다 수백 년 앞섰죠. 무거운 동전을 대신하려 만든 것.', f:'"돈은 서양에서 발달했다"는 인상과 달리, 지폐의 시작은 동양이었습니다.'},
  {c:'money', t:'가장 비싼 향신료', b:'사프란은 그램당 금값에 맞먹습니다. 꽃 하나에서 암술 3개만 손으로 따야 해서, 1kg에 꽃 15만 송이가 필요하죠.', f:'"붉은 금"이라 불리는 이유. 노동력이 곧 가격입니다.'},
  {c:'money', t:'억만장자가 되려면', b:'하루도 안 쉬고 매일 100만 원씩 모아도 10억은 약 3년, 1조는 약 2,700년이 걸립니다. "조" 단위 부의 스케일은 상상 이상.', f:'"백만장자"와 "억만장자(빌리어네어)"의 격차가 얼마나 큰지 실감나는 계산.'},
  {c:'money', t:'인플레이션과 짜장면값', b:'1960년대 짜장면은 15~20원 수준이었습니다. 지금 7,000원대라면 수백 배 오른 것. 돈 가치가 그만큼 떨어진 증거.', f:'"옛날엔 얼마였는데"라는 말은 향수가 아니라 인플레이션 데이터입니다.'},

  // ── 종교 ──
  {c:'religion', t:'세계 3대 종교 인구', b:'신자 수로는 기독교(약 24억), 이슬람(약 19억), 힌두교(약 12억) 순입니다. 이 셋만으로 세계 인구의 절반을 훌쩍 넘죠.', f:'"세계 3대 종교"라 하면 보통 불교를 넣지만, 인구로는 힌두교가 훨씬 많습니다.'},
  {c:'religion', t:'세 종교가 한 도시를 성지로', b:'예루살렘은 유대교·기독교·이슬람 모두에게 성지입니다. 한 도시가 세 종교의 중심이라 역사적 갈등도 깊었죠.', f:'통곡의 벽(유대교), 성묘 교회(기독교), 바위 돔(이슬람)이 좁은 구역에 함께 있습니다.'},
  {c:'religion', t:'가장 오래된 종교 중 하나', b:'힌두교는 특정 창시자 없이 수천 년에 걸쳐 형성됐습니다. 그래서 "가장 오래된 살아있는 종교"로 자주 꼽히죠.', f:'교리를 만든 한 사람이 없다는 점에서 다른 주요 종교들과 성격이 다릅니다.'},
  {c:'religion', t:'이슬람의 다섯 기둥', b:'신앙고백·기도(하루 5번)·자선·라마단 금식·메카 순례. 무슬림 삶의 다섯 가지 핵심 의무입니다.', f:'해마다 수백만 명이 같은 시기에 메카로 모이는 "하지"가 그중 하나입니다.'},
  {c:'religion', t:'불교는 신을 안 믿는다?', b:'불교는 창조신 숭배보다 "깨달음"과 수행을 중심에 둡니다. 그래서 "종교이자 철학"으로 불리기도 하죠.', f:'"신에게 기도하는 종교"라는 일반적 틀에 잘 안 맞는 독특한 위치.'},
  {c:'religion', t:'기독교의 세 갈래', b:'가톨릭·정교회·개신교로 크게 나뉩니다. 1054년 동서 분열, 16세기 종교개혁을 거치며 갈라졌죠.', f:'같은 "기독교"라도 예배·조직·전통이 꽤 다른 이유가 이 역사적 분기점들.'},
  {c:'religion', t:'가장 많이 번역된 책', b:'성경은 전체 또는 일부가 3,000개 이상의 언어로 번역됐습니다. 인류 역사상 가장 널리 번역·배포된 책이죠.', f:'출판·번역 규모로는 어떤 책도 성경을 따라오지 못합니다.'},
  {c:'religion', t:'라마단은 왜 매년 당겨지나', b:'이슬람력은 순수 음력이라 양력보다 1년이 약 11일 짧습니다. 그래서 라마단이 해마다 조금씩 앞당겨지죠.', f:'수십 년에 걸쳐 라마단이 사계절을 한 바퀴 돕니다.'},
  {c:'religion', t:'유대교·기독교·이슬람의 공통 조상', b:'세 종교 모두 아브라함을 신앙의 조상으로 봅니다. 그래서 "아브라함 계열 종교"로 묶이죠.', f:'서로 다투기도 했지만, 뿌리에서는 같은 인물을 공유하는 형제 종교입니다.'},
  {c:'religion', t:'세계에서 가장 큰 종교 건축물', b:'캄보디아의 앙코르 와트는 원래 힌두교 사원으로 지어졌다가 후에 불교 사원이 됐습니다. 단일 종교 건축물로 세계 최대급.', f:'한 건축물이 두 종교의 성지를 거친 드문 사례입니다.'}
  ];

  // ───────── 상태 ─────────
  const $=id=>document.getElementById(id);
  let filter='all';
  let order=[];
  let idx=0;

  function loadFav(){ try{ return JSON.parse(localStorage.getItem('trivia-fav'))||[]; }catch(e){ return []; } }
  function saveFav(a){ try{ localStorage.setItem('trivia-fav', JSON.stringify(a)); }catch(e){} }
  function cardId(c){ return c.c+'|'+c.t; }

  // 분야 탭
  const catsEl=$('cats');
  function buildCats(){
    catsEl.innerHTML='';
    const all=document.createElement('div');
    all.className='cat'+(filter==='all'?' on':'');
    all.style.setProperty('--c','#8a93ff');
    all.textContent='전체';
    all.onclick=()=>{ filter='all'; reshuffle(); buildCats(); };
    catsEl.appendChild(all);
    for(const k in CATS){
      const c=document.createElement('div');
      c.className='cat'+(filter===k?' on':'');
      c.style.setProperty('--c',CATS[k].color);
      c.textContent=CATS[k].name;
      c.onclick=()=>{ filter=k; reshuffle(); buildCats(); };
      catsEl.appendChild(c);
    }
    const fav=document.createElement('div');
    fav.className='cat'+(filter==='fav'?' on':'');
    fav.style.setProperty('--c','#ffd23b');
    fav.textContent='★ 모아보기';
    fav.onclick=()=>{ filter='fav'; reshuffle(); buildCats(); };
    catsEl.appendChild(fav);
  }

  function pool(){
    if(filter==='all') return CARDS.slice();
    if(filter==='fav'){ const f=loadFav(); return CARDS.filter(c=>f.includes(cardId(c))); }
    return CARDS.filter(c=>c.c===filter);
  }

  function shuffle(a){ for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }

  function reshuffle(){
    order=shuffle(pool());
    idx=0;
    render();
  }

  function render(){
    const p=order;
    if(p.length===0){
      $('card-cat').textContent='';
      $('card').style.setProperty('--cardc','#6b7285');
      $('card-title').textContent='아직 없어요';
      $('card-body').textContent = filter==='fav' ? '마음에 드는 카드의 ★를 누르면 여기에 모입니다.' : '카드가 없습니다.';
      $('card-flex').textContent='';
      $('counter').textContent='';
      $('fav-star').style.display='none';
      return;
    }
    $('fav-star').style.display='block';
    const c=p[idx];
    const cat=CATS[c.c];
    const card=$('card');
    card.style.setProperty('--cardc', cat.color);
    $('card-cat').textContent=cat.name;
    $('card-title').textContent=c.t;
    $('card-body').textContent=c.b;
    $('card-flex').innerHTML='<b>아는 척 포인트 ▸</b> '+c.f;
    $('counter').textContent=(idx+1)+' / '+p.length;
    const fav=loadFav();
    $('fav-star').classList.toggle('on', fav.includes(cardId(c)));
    // 카드 등장 애니메이션
    card.style.opacity='0';
    card.style.transform='translateY(10px)';
    $('card-body').scrollTop=0;
    requestAnimationFrame(()=>{
      card.style.transition='opacity 0.2s ease, transform 0.2s ease';
      card.style.opacity='1';
      card.style.transform='translateY(0)';
    });
  }

  function next(){ if(order.length){ idx=(idx+1)%order.length; render(); } }
  function prev(){ if(order.length){ idx=(idx-1+order.length)%order.length; render(); } }

  $('next-btn').onclick=next;
  $('prev-btn').onclick=prev;
  $('card').addEventListener('click', e=>{
    if(e.target.id==='fav-star') return;
    next();
  });
  $('fav-star').onclick=(e)=>{
    e.stopPropagation();
    if(!order.length) return;
    const c=order[idx];
    let f=loadFav();
    const id=cardId(c);
    if(f.includes(id)) f=f.filter(x=>x!==id);
    else f.push(id);
    saveFav(f);
    render();
  };

  // 스와이프
  let sx=0, sy=0;
  $('stage').addEventListener('touchstart', e=>{ sx=e.touches[0].clientX; sy=e.touches[0].clientY; }, {passive:true});
  $('stage').addEventListener('touchend', e=>{
    const dx=e.changedTouches[0].clientX-sx, dy=e.changedTouches[0].clientY-sy;
    if(Math.abs(dx)>40 && Math.abs(dx)>Math.abs(dy)){
      if(dx<0) next(); else prev();
    }
  }, {passive:true});

  buildCats();
  reshuffle();
})();
</script>
</body>
</html>
